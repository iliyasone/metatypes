name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .

  typecheck-test:
    name: typecheck (mypy) + test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups
      - name: mypy
        run: uv run mypy --warn-unused-ignores --show-error-codes --enable-error-code ignore-without-code .
      - name: pytest
        run: uv run pytest -v
