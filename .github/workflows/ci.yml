name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .

  thesis-lint:
    name: thesis lint (ruff on Markdown code blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups
      - name: ruff format Python blocks in Markdown
        run: uv run python scripts/format_md_python.py --check THESIS.md README.md

  typecheck-test:
    name: typecheck (mypy) + test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --all-groups
      - name: mypy
        run: uv run mypy --warn-unused-ignores --show-error-codes --enable-error-code ignore-without-code .
      - name: pytest
        run: uv run pytest -v

  thesis-pdf:
    # Smoke test: the thesis and annotation still compile to PDF. Times New
    # Roman is not installable on the runner, so the scripts fall back to
    # Tinos (fonts-croscore) — pagination may differ slightly from the
    # submission PDFs, which are built locally and committed.
    name: thesis pdf (pandoc + xelatex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install pandoc (pinned to the local build's version)
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-1-amd64.deb
          sudo dpkg -i pandoc-3.9.0.2-1-amd64.deb
      - name: install texlive
        # texlive-latex-recommended: fontspec, unicode-math, pdfpages,
        #   polyglossia, extsizes; texlive-latex-extra: upquote, xurl;
        #   texlive-pictures: tikz; lmodern/fonts-lmodern: Latin Modern
        #   (pandoc template default); fonts-croscore: Tinos fallback font;
        #   texlive-lang-cyrillic: Russian hyphenation for the annotation.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-recommended texlive-latex-extra \
            texlive-pictures texlive-fonts-recommended texlive-plain-generic \
            texlive-lang-cyrillic lmodern fonts-lmodern fonts-croscore
      - name: build thesis PDF
        run: ./scripts/build_thesis_pdf.sh ci-thesis.pdf ci-thesis-final.pdf
      - name: build annotation PDF
        run: ./scripts/build_annotation_pdf.sh ci-annotation.pdf ci-annotation-final.pdf
      - name: upload built PDFs
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdfs
          path: ci-*.pdf
          retention-days: 7
